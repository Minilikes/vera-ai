<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera — AI Deepfake Detection</title>
  <meta name="description" content="Vera uses EfficientNet deep learning to instantly detect whether an image is real or AI-generated / deepfake." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080b13;
      --surface:     #0e1422;
      --surface-2:   #141c30;
      --border:      rgba(255,255,255,.07);
      --border-glow: rgba(99,179,237,.25);
      --accent:      #3b8bff;
      --accent-2:    #8b5cf6;
      --real:        #10d9a0;
      --fake:        #f55f74;
      --text:        #e2e8f0;
      --muted:       #64748b;
      --radius:      16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* ── Background Grid ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,139,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,139,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Ambient Blobs ────────────────────────────────── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: rgba(59,139,255,.12); top: -150px; left: -150px; }
    .blob-2 { width: 400px; height: 400px; background: rgba(139,92,246,.10); bottom: -100px; right: -100px; animation-delay: -6s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* ── Layout ───────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Header ───────────────────────────────────────── */
    header { text-align: center; }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(59,139,255,.4);
    }

    .logo-icon svg { width: 24px; height: 24px; }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .tagline {
      font-size: .95rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: .02em;
    }

    /* ── Status Badge ─────────────────────────────────── */
    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: 100px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-top: 14px;
      transition: all .3s;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-ready   .dot { background: var(--real); }
    .status-loading .dot { background: #fbbf24; }
    .status-error   .dot { background: var(--fake); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.75); }
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: border-color .3s;
    }

    /* ── Drop Zone ────────────────────────────────────── */
    #drop-zone {
      border: 2px dashed rgba(99,179,237,.3);
      border-radius: 12px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      overflow: hidden;
    }

    #drop-zone:hover, #drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(59,139,255,.05);
    }

    #drop-zone.has-image {
      border-style: solid;
      border-color: rgba(99,179,237,.4);
      padding: 0;
    }

    #preview-img {
      display: none;
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 10px;
    }

    #drop-zone.has-image #preview-img { display: block; }
    #drop-zone.has-image .drop-hint   { display: none; }

    .drop-icon {
      width: 52px; height: 52px;
      margin: 0 auto 14px;
      border-radius: 14px;
      background: rgba(59,139,255,.1);
      border: 1px solid rgba(59,139,255,.2);
      display: flex; align-items: center; justify-content: center;
    }

    .drop-icon svg { width: 26px; height: 26px; stroke: var(--accent); }

    .drop-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .drop-sub {
      font-size: .8rem;
      color: var(--muted);
    }

    input[type="file"] { display: none; }

    /* ── Analyze Button ───────────────────────────────── */
    #analyze-btn {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: .02em;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(59,139,255,.3);
    }

    #analyze-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59,139,255,.45);
    }

    #analyze-btn:active:not(:disabled) { transform: translateY(0); }

    #analyze-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ───────────────────────────────────────── */
    #result-card {
      display: none;
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #result-card.real {
      background: linear-gradient(135deg, rgba(16,217,160,.08), rgba(16,217,160,.03));
      border-color: rgba(16,217,160,.3);
    }

    #result-card.fake {
      background: linear-gradient(135deg, rgba(245,95,116,.08), rgba(245,95,116,.03));
      border-color: rgba(245,95,116,.3);
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .verdict-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .real .verdict-icon { background: rgba(16,217,160,.15); }
    .fake .verdict-icon { background: rgba(245,95,116,.15); }

    .verdict-label {
      font-size: 1.6rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    .real .verdict-label { color: var(--real); }
    .fake .verdict-label { color: var(--fake); }

    .verdict-sub {
      font-size: .83rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Confidence bar */
    .conf-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .conf-label { font-size: .8rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    .conf-value { font-size: 1rem; font-weight: 700; color: #fff; }

    .bar-track {
      height: 8px;
      background: var(--surface-2);
      border-radius: 100px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    .real .bar-fill { background: linear-gradient(90deg, #10d9a0, #34d399); }
    .fake .bar-fill { background: linear-gradient(90deg, #f55f74, #fb7185); }

    /* Raw score */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: .8rem;
      color: var(--muted);
    }

    .meta-row strong { color: var(--text); }

    /* Reset button */
    #reset-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }

    #reset-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); }

    /* ── Error Toast ──────────────────────────────────── */
    #error-msg {
      display: none;
      padding: 12px 16px;
      background: rgba(245,95,116,.1);
      border: 1px solid rgba(245,95,116,.3);
      border-radius: 10px;
      color: #fca5a5;
      font-size: .87rem;
      font-weight: 500;
      margin-top: 14px;
      animation: fadeUp .3s ease;
    }

    /* ── Footer ───────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: .78rem;
      color: var(--muted);
    }

    footer span { color: rgba(255,255,255,.25); margin: 0 8px; }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 20px; }
      #drop-zone { padding: 32px 16px; }
    }
  </style>
</head>

<body>

  <!-- Ambient -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">

    <!-- Header -->
    <header>
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>Ver<span>a</span></h1>
      </div>
      <p class="tagline">AI-Powered Deepfake &amp; Media Authenticity Detector</p>
      <div id="status-badge" class="status-loading">
        <span class="dot"></span>
        <span id="status-text">Connecting to model…</span>
      </div>
    </header>

    <!-- Upload Card -->
    <div class="card">
      <div id="drop-zone" role="button" aria-label="Upload image for analysis">
        <img id="preview-img" alt="Uploaded preview" />
        <div class="drop-hint">
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="drop-title">Drop an image here, or click to browse</p>
          <p class="drop-sub">Supports JPG, PNG, WEBP — Max 10 MB</p>
        </div>
      </div>

      <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.webp" />

      <button id="analyze-btn" disabled>
        <div class="btn-spinner" id="btn-spinner"></div>
        <svg id="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span id="btn-label">Analyze Image</span>
      </button>

      <div id="error-msg" role="alert"></div>
    </div>

    <!-- Result Card -->
    <div id="result-card">
      <div class="result-header">
        <div class="verdict-icon" id="verdict-icon"></div>
        <div>
          <div class="verdict-label" id="verdict-label">—</div>
          <div class="verdict-sub" id="verdict-sub">—</div>
        </div>
      </div>

      <div class="conf-row">
        <span class="conf-label">Confidence</span>
        <span class="conf-value" id="conf-value">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>

      <div class="meta-row">
        <span>Raw model score</span>
        <strong id="raw-score">—</strong>
      </div>

      <button id="reset-btn">↺ &nbsp;Analyze another image</button>
    </div>

    <!-- Footer -->
    <footer>
      Vera v1.0 <span>|</span> EfficientNetB0 Architecture <span>|</span> For research use only
    </footer>

  </div>

  <script>
    // ── Elements ──────────────────────────────────────────
    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const previewImg  = document.getElementById('preview-img');
    const analyzeBtn  = document.getElementById('analyze-btn');
    const btnSpinner  = document.getElementById('btn-spinner');
    const btnIcon     = document.getElementById('btn-icon');
    const btnLabel    = document.getElementById('btn-label');
    const errorMsg    = document.getElementById('error-msg');
    const resultCard  = document.getElementById('result-card');
    const statusBadge = document.getElementById('status-badge');
    const statusText  = document.getElementById('status-text');
    const resetBtn    = document.getElementById('reset-btn');

    let selectedFile = null;
    let modelReady   = false;

    // ── Model Status Poll ─────────────────────────────────
    async function checkStatus() {
      try {
        const res  = await fetch('/api/status');
        const data = await res.json();

        if (data.ready) {
          setStatus('ready', '● Model Ready');
          modelReady = true;
          updateAnalyzeBtn();
        } else {
          setStatus('error', `Model ${data.model}`);
        }
      } catch {
        setStatus('error', 'Server unreachable');
      }
    }

    function setStatus(type, text) {
      statusBadge.className = `status-${type}`;
      statusText.textContent = text;
    }

    checkStatus();

    // ── Drag & Drop ───────────────────────────────────────
    dropZone.addEventListener('click',      () => fileInput.click());
    dropZone.addEventListener('dragover',   e  => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave',  ()  => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      hideError();
      hideResult();

      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        dropZone.classList.add('has-image');
      };
      reader.readAsDataURL(file);
      updateAnalyzeBtn();
    }

    function updateAnalyzeBtn() {
      analyzeBtn.disabled = !(selectedFile && modelReady);
    }

    // ── Analyze ───────────────────────────────────────────
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      setLoading(true);
      hideError();
      hideResult();

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res  = await fetch('/api/analyze', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Analysis failed.');
        showResult(data);
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    });

    // ── UI Helpers ────────────────────────────────────────
    function setLoading(on) {
      analyzeBtn.disabled = on;
      btnSpinner.style.display = on ? 'block' : 'none';
      btnIcon.style.display    = on ? 'none'  : 'block';
      btnLabel.textContent     = on ? 'Analyzing…' : 'Analyze Image';
    }

    function showResult(data) {
      const isReal = data.verdict === 'REAL';

      resultCard.className = isReal ? 'real' : 'fake';
      resultCard.style.display = 'block';

      document.getElementById('verdict-icon').textContent = isReal ? '✓' : '✕';
      document.getElementById('verdict-label').textContent = isReal ? 'AUTHENTIC' : 'DEEPFAKE';
      document.getElementById('verdict-sub').textContent  = isReal
        ? 'This image appears to be genuine media.'
        : 'This image shows signs of AI manipulation.';
      document.getElementById('conf-value').textContent  = `${data.confidence}%`;
      document.getElementById('raw-score').textContent   = data.raw_score;

      // Animate bar after a tick
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.getElementById('bar-fill').style.width = `${data.confidence}%`;
        });
      });
    }

    function hideResult() {
      resultCard.style.display = 'none';
      document.getElementById('bar-fill').style.width = '0%';
    }

    function showError(msg) {
      errorMsg.textContent    = `⚠ ${msg}`;
      errorMsg.style.display  = 'block';
    }

    function hideError() {
      errorMsg.style.display = 'none';
    }

    // ── Reset ─────────────────────────────────────────────
    resetBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      previewImg.src = '';
      dropZone.classList.remove('has-image');
      hideResult();
      hideError();
      updateAnalyzeBtn();
    });
  </script>

</body>
</html>
